<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>家計簿ツール v2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f0f4f8;margin:0;padding:20px}
.container{max-width:900px;margin:0 auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
h1{text-align:center;color:#2c3e50}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:25px}
.card{padding:20px;border-radius:10px;text-align:center;color:#fff}
.income{background:#4CAF50}
.expense{background:#f44336}
.balance{background:#2196F3}
.card h3{margin:0 0 10px;font-size:14px;font-weight:400}
.card p{margin:0;font-size:24px;font-weight:700}

form{margin-bottom:25px;padding:20px;background:#f8f9fa;border-radius:10px}

input,select,button{padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
button{background:#3498db;color:#fff;border:none;cursor:pointer;font-weight:700}
button:hover{background:#2980b9}
.actions{text-align:center;margin-bottom:20px}
.actions button{margin:0 5px;padding:8px 16px}
.btn-csv{background:#16a085}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left;border-bottom:1px solid #eee}
th{background:#34495e;color:#fff;font-weight:400}
.t-income{color:#4CAF50;font-weight:700}
.t-expense{color:#f44336;font-weight:700}
.del{background:#e74c3c;padding:6px 12px;font-size:12px}
.empty{text-align:center;padding:40px;color:#999}
@media(max-width:600px){form>div{grid-template-columns:1fr 1fr !important}.summary{grid-template-columns:1fr}}
@media(max-width:700px){#chartsArea{grid-template-columns:1fr !important}}

.budget-box{background:#fff3e0;padding:20px;border-radius:10px;margin-bottom:25px;border-left:5px solid #ff9800}
.budget-box h3{margin:0 0 15px;color:#e65100}
.budget-item{margin-bottom:12px}
.budget-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.bar{background:#fff;border-radius:20px;height:20px;overflow:hidden;border:1px solid #ddd}
.fill{height:100%;background:linear-gradient(90deg,#4CAF50,#8BC34A);text-align:right;color:#fff;font-size:11px;padding-right:8px;line-height:20px;white-space:nowrap;transition:width .5s}
.fill.warn{background:linear-gradient(90deg,#ff9800,#ffc107)}
.fill.over{background:linear-gradient(90deg,#f44336,#e91e63)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000}
.modal.on{display:flex}
.modal-content{background:#fff;padding:30px;border-radius:12px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;align-items:center}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-orange{background:#e67e22}
.btn-orange:hover{background:#d35400}
.btn-gray{background:#95a5a6}
.btn-gray:hover{background:#7f8c8d}
/* ===== スマホ見やすさ改善 ===== */
html {
  -webkit-text-size-adjust: 100%;
}

table {
  min-width: 720px;
}

@media (max-width: 768px) {
  body {
    padding: 10px;
  }

  .container {
    padding: 16px;
    border-radius: 10px;
  }

  h1 {
    font-size: 24px;
    margin-top: 0;
    margin-bottom: 16px;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .actions button {
    margin: 0;
    min-height: 44px;
    padding: 10px 12px;
    font-size: 14px;
    flex: 1 1 calc(50% - 8px);
  }

  .summary {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .card {
    padding: 16px;
  }

  .card p {
    font-size: 22px;
  }

  form {
    padding: 14px;
  }

  form > div:first-child,
  form > div:last-child {
    grid-template-columns: 1fr !important;
  }

  #search,
  #fMonth,
  #fType,
  #date,
  #type,
  #category,
  #amount,
  #shop,
  #memo {
    width: 100%;
    min-height: 44px;
    font-size: 16px;
  }

  form button[type="submit"] {
    min-height: 46px;
    width: 100%;
  }

  #chartsArea {
    grid-template-columns: 1fr !important;
    gap: 14px !important;
  }

  .budget-box {
    padding: 14px;
  }

  .budget-label {
    flex-direction: column;
    gap: 4px;
  }

  .modal-content {
    width: 95%;
    padding: 18px;
    max-height: 88vh;
  }

  .modal-row {
    grid-template-columns: 1fr;
  }

  .modal-actions {
    flex-direction: column;
  }

  .modal-actions button {
    width: 100%;
    min-height: 44px;
  }

  div[style*="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap"] {
    flex-direction: column;
  }

  div[style*="display:grid;grid-template-columns:80px 1fr 1fr 1fr;gap:8px;margin-bottom:8px"] {
    grid-template-columns: 1fr !important;
  }

  div[style*="display:grid;grid-template-columns:1fr 2fr auto;gap:8px"] {
    grid-template-columns: 1fr !important;
  }

  div[style*="display:grid;grid-template-columns:1fr 2fr auto;gap:10px"] {
    grid-template-columns: 1fr !important;
  }

  table {
    font-size: 13px;
  }

  th, td {
    padding: 10px 8px;
    white-space: nowrap;
  }

  .del {
    min-height: 36px;
    padding: 8px 10px;
  }
}

/* テーブル横スクロール */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  width: 100%;
}
/* スマホ用カード一覧 */
.card-list {
  display: none;
}

.entry-card {
  background: #fff;
  border: 1px solid #e6eaf0;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}

.entry-card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.entry-card-date {
  font-size: 13px;
  color: #666;
}

.entry-card-amount {
  font-size: 18px;
  font-weight: 700;
}

.entry-card-body {
  display: grid;
  gap: 6px;
  font-size: 13px;
  color: #333;
}

.entry-card-row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

.entry-card-label {
  min-width: 52px;
  color: #777;
  font-size: 12px;
}

.entry-card-value {
  flex: 1;
  word-break: break-word;
}

.entry-card-actions {
  margin-top: 10px;
  text-align: right;
}

/* 下部固定追加ボタン */
.fab-add {
  display: none;
  position: fixed;
  right: 16px;
  bottom: 16px;
  z-index: 1100;
  border: none;
  border-radius: 999px;
  padding: 14px 18px;
  background: linear-gradient(135deg, #3498db, #2980b9);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  box-shadow: 0 8px 20px rgba(52,152,219,.35);
}

.fab-add:hover {
  background: linear-gradient(135deg, #2980b9, #2471a3);
}

@media (max-width: 768px) {
  #tableWrap {
    display: none;
  }

  .card-list {
    display: block;
  }

  .fab-add {
    display: block;
  }

  body {
    padding-bottom: 90px;
  }
}
/* グラフのはみ出し防止 */
#chartsArea > div {
  min-width: 0;
  overflow: hidden;
}

#chartsArea canvas {
  display: block;
  width: 100% !important;
  max-width: 100% !important;
  height: auto !important;
}

@media (max-width: 768px) {
  #chartsArea {
    width: 100%;
    overflow: hidden;
  }

  #chartsArea > div {
    width: 100%;
    padding: 14px !important;
  }

  #monChart,
  #catChart {
    max-width: 100% !important;
  }
}
#chartsArea > div {
  position: relative;
  height: 320px;
}

@media (max-width: 768px) {
  #chartsArea > div {
    height: 260px;
  }
}
</style>
</head>
<body>
<div class="container">
<h1>💰 家計簿ツール</h1>

<div class="actions">
<button class="btn-orange" onclick="openBudget()">🎯 予算設定</button>
<button class="btn-orange" onclick="openRecurring()" style="background:#27ae60">🔁 定期収支</button>
<button class="btn-csv" onclick="exportCSV()">📤 CSV出力</button>
<button class="btn-csv" onclick="document.getElementById('csvFile').click()">📥 CSV読込</button>
<input type="file" id="csvFile" accept=".csv" style="display:none" onchange="importCSV(event)">
<button class="btn-csv" onclick="exportJSON()" style="background:#9b59b6">💾 バックアップ</button>
<button class="btn-csv" onclick="document.getElementById('jsonFile').click()" style="background:#9b59b6">📂 復元</button>
<input type="file" id="jsonFile" accept=".json" style="display:none" onchange="importJSON(event)">
</div>

<div class="summary">
<div class="card income"><h3>収入</h3><p>¥<span id="totalIncome">0</span></p></div>
<div class="card expense"><h3>支出</h3><p>¥<span id="totalExpense">0</span></p></div>
<div class="card balance"><h3>残高</h3><p>¥<span id="balance">0</span></p></div>
</div>

<form id="entryForm">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px">
<input type="date" id="date" required>
<select id="type" required>
<option value="expense">支出</option>
<option value="income">収入</option>
</select>
<select id="category" required>
<option value="食費">食費</option>
<option value="交通費">交通費</option>
<option value="日用品">日用品</option>
<option value="娯楽">娯楽</option>
<option value="光熱費">光熱費</option>
<option value="家賃">家賃</option>
<option value="医療">医療</option>
<option value="給料">給料</option>
<option value="その他">その他</option>
</select>
<input type="number" id="amount" placeholder="金額" required min="1">
</div>
<div style="display:grid;grid-template-columns:1fr 2fr auto;gap:10px">
<input type="text" id="shop" placeholder="店舗名(任意)">
<input type="text" id="memo" placeholder="メモ(任意)">
<button type="submit">追加</button>
</div>
</form>

<div class="budget-box">
<h3>🎯 予算達成状況(今月)</h3>
<div id="budgetList"></div>
</div>
<div class="budget-box" style="background:#e3f2fd;border-left-color:#2196F3">
<h3 style="color:#0d47a1">🗓️ 年間予算達成状況(<span id="currentYear"></span>年)</h3>
<div id="yearlyBudgetList"></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:25px" id="chartsArea">
<div style="background:#fafbfc;padding:20px;border-radius:10px;border:1px solid #eee">
<h3 style="margin:0 0 15px;color:#555;font-size:15px;text-align:center">📊 カテゴリ別支出</h3>
<canvas id="catChart"></canvas>
</div>
<div style="background:#fafbfc;padding:20px;border-radius:10px;border:1px solid #eee">
<h3 style="margin:0 0 15px;color:#555;font-size:15px;text-align:center">📈 月別推移</h3>
<canvas id="monChart"></canvas>
</div>
</div>
<div style="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap">
<input type="text" id="search" placeholder="🔍 検索(カテゴリ・金額)" style="flex:1;min-width:150px">
<select id="fMonth" style="flex:1;min-width:150px"><option value="all">すべての月</option></select>
<select id="fType" style="flex:1;min-width:150px">
<option value="all">すべての種類</option>
<option value="income">収入のみ</option>
<option value="expense">支出のみ</option>
</select>
</div>
<div class="table-wrap" id="tableWrap">
<table>
<thead><tr><th>日付</th><th>種類</th><th>カテゴリ</th><th>店舗</th><th>メモ</th><th>金額</th><th>操作</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div id="cardList" class="card-list"></div>

<div id="emptyMsg" class="empty" style="display:none">記録がありません。</div>
<script>
let entries = JSON.parse(localStorage.getItem('kakeibo') || '[]');
let budgets = JSON.parse(localStorage.getItem('kakeibo_budgets') || '{}');
const EXP_CATS = ['食費','交通費','日用品','娯楽','光熱費','家賃','医療','その他'];
let recurring = JSON.parse(localStorage.getItem('kakeibo_recurring') || '[]');
let yearlyBudgets = JSON.parse(localStorage.getItem('kakeibo_yearly') || '{}');

function saveYearlyBudgets() {
  localStorage.setItem('kakeibo_yearly', JSON.stringify(yearlyBudgets));
}
let appliedMonths = JSON.parse(localStorage.getItem('kakeibo_applied') || '{}');

function saveRecurring() {
  localStorage.setItem('kakeibo_recurring', JSON.stringify(recurring));
  localStorage.setItem('kakeibo_applied', JSON.stringify(appliedMonths));
}

function openRecurring() {
  renderRecurring();
  document.getElementById('recurringModal').classList.add('on');
}

function closeRecurring() {
  document.getElementById('recurringModal').classList.remove('on');
}

function addRecurring() {
  const day = parseInt(document.getElementById('rDay').value, 10);
  const type = document.getElementById('rType').value;
  const category = document.getElementById('rCategory').value;
  const amount = parseInt(document.getElementById('rAmount').value, 10);
  const shop = document.getElementById('rShop').value.trim();
  const memo = document.getElementById('rMemo').value.trim();
  
  if (!day || day < 1 || day > 31) { alert('日付は1〜31で入力してください'); return; }
  if (!amount || amount < 1) { alert('金額を入力してください'); return; }
  
  recurring.push({
    id: Date.now(),
    day: day,
    type: type,
    category: category,
    amount: amount,
    shop: shop,
    memo: memo
  });
  saveRecurring();
  renderRecurring();
  
  // フォームクリア
  document.getElementById('rAmount').value = '';
  document.getElementById('rShop').value = '';
  document.getElementById('rMemo').value = '';
  alert('定期収支を追加しました');
}

function deleteRecurring(id) {
  if (!confirm('この定期項目を削除しますか?')) return;
  recurring = recurring.filter(r => r.id !== id);
  saveRecurring();
  renderRecurring();
}

function renderRecurring() {
  const list = document.getElementById('recurringList');
  if (recurring.length === 0) {
    list.innerHTML = '<p style="color:#888;font-size:13px;text-align:center;padding:20px">登録されていません</p>';
    return;
  }
  list.innerHTML = '';
  recurring.sort((a, b) => a.day - b.day).forEach(r => {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #eee;font-size:13px';
    div.innerHTML = '<div>' +
      '<b>毎月' + r.day + '日</b> ' +
      '<span class="t-' + r.type + '">' + (r.type === 'income' ? '収入' : '支出') + '</span> / ' +
      r.category + ' / ¥' + yen(r.amount) + 
      (r.memo ? ' <span style="color:#888">(' + r.memo + ')</span>' : '') +
      '</div>' +
      '<button class="del" onclick="deleteRecurring(' + r.id + ')">削除</button>';
    list.appendChild(div);
  });
}

function applyRecurring() {
  if (recurring.length === 0) {
    alert('定期収支が登録されていません');
    return;
  }
  
  const now = new Date();
  const ym = now.toISOString().slice(0, 7);
  
  if (appliedMonths[ym] && !confirm('今月分は既に反映済みです。再度反映しますか?(重複登録になります)')) {
    return;
  }
  
  const year = now.getFullYear();
  const month = now.getMonth();
  let count = 0;
  
  recurring.forEach(r => {
    // その月の最終日を超える日は最終日に調整
    const lastDay = new Date(year, month + 1, 0).getDate();
    const day = Math.min(r.day, lastDay);
    const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
    
    entries.push({
      id: Date.now() + Math.random(),
      date: dateStr,
      type: r.type,
      category: r.category,
      shop: r.shop || '',
      memo: (r.memo || '') + ' [定期]',
      amount: r.amount
    });
    count++;
  });
  
  appliedMonths[ym] = true;
  saveRecurring();
  save();
  render();
  alert(count + '件の定期収支を反映しました');
}

// 月が変わったら自動で反映を促す
function checkRecurring() {
  if (recurring.length === 0) return;
  const ym = new Date().toISOString().slice(0, 7);
  if (!appliedMonths[ym]) {
    setTimeout(() => {
      if (confirm('今月の定期収支(' + recurring.length + '件)を反映しますか?')) {
        applyRecurring();
      } else {
        // 「あとで」の場合は記録しないので、次回起動時にまた聞かれる
      }
    }, 500);
  }
}
function saveBudgetsToStorage() {
  localStorage.setItem('kakeibo_budgets', JSON.stringify(budgets));
}

function openBudget() {
  const wrap = document.getElementById('budgetInputs');
  wrap.innerHTML = '';
  EXP_CATS.forEach(c => {
    const row = document.createElement('div');
    row.className = 'modal-row';
    row.innerHTML = '<label>' + c + '</label><input type="number" min="0" value="' + (budgets[c] || 0) + '" data-cat="' + c + '">';
    wrap.appendChild(row);
  });
  
  const yWrap = document.getElementById('yearlyBudgetInputs');
  yWrap.innerHTML = '';
  EXP_CATS.forEach(c => {
    const row = document.createElement('div');
    row.className = 'modal-row';
    const suggested = (budgets[c] || 0) * 12;
    row.innerHTML = '<label>' + c + (suggested > 0 ? '<br><small style="color:#888">月×12=¥' + yen(suggested) + '</small>' : '') + '</label><input type="number" min="0" value="' + (yearlyBudgets[c] || 0) + '" data-cat="' + c + '">';
    yWrap.appendChild(row);
  });
  
  switchBudgetTab('monthly');
  document.getElementById('budgetModal').classList.add('on');
}
function closeBudget() {
  document.getElementById('budgetModal').classList.remove('on');
}

function switchBudgetTab(tab) {
  document.getElementById('monthlyTab').style.display = tab === 'monthly' ? 'block' : 'none';
  document.getElementById('yearlyTab').style.display = tab === 'yearly' ? 'block' : 'none';
  document.getElementById('tabMonthly').style.background = tab === 'monthly' ? '#e67e22' : '#bdc3c7';
  document.getElementById('tabYearly').style.background = tab === 'yearly' ? '#e67e22' : '#bdc3c7';
}

function saveBudgets() {
  document.querySelectorAll('#budgetInputs input').forEach(i => {
    budgets[i.dataset.cat] = parseInt(i.value, 10) || 0;
  });
  document.querySelectorAll('#yearlyBudgetInputs input').forEach(i => {
    yearlyBudgets[i.dataset.cat] = parseInt(i.value, 10) || 0;
  });
  saveBudgetsToStorage();
  saveYearlyBudgets();
  renderBudgets();
  closeBudget();
  alert('予算を保存しました');
}

function renderBudgets() {
  const list = document.getElementById('budgetList');
  const thisMonth = new Date().toISOString().slice(0, 7);
  const monthExp = entries.filter(e => e.type === 'expense' && e.date.startsWith(thisMonth));
  const active = EXP_CATS.filter(c => budgets[c] > 0);
  
  if (active.length === 0) {
    list.innerHTML = '<p style="color:#888;font-size:13px;margin:0">予算が設定されていません。「🎯 予算設定」から設定してください。</p>';
    return;
  }
  
  list.innerHTML = '';
  active.forEach(c => {
    const used = monthExp.filter(e => e.category === c).reduce((s, e) => s + e.amount, 0);
    const limit = budgets[c];
    const pct = Math.min((used / limit) * 100, 100);
    const cls = used > limit ? 'over' : used > limit * 0.8 ? 'warn' : '';
    const div = document.createElement('div');
    div.className = 'budget-item';
    div.innerHTML = '<div class="budget-label"><span><b>' + c + '</b></span>' +
      '<span>¥' + yen(used) + ' / ¥' + yen(limit) + ' (' + Math.round(used / limit * 100) + '%)</span></div>' +
      '<div class="bar"><div class="fill ' + cls + '" style="width:' + pct + '%">' + Math.round(pct) + '%</div></div>';
    list.appendChild(div);
  });
}
function renderYearlyBudgets() {
  const list = document.getElementById('yearlyBudgetList');
  const year = new Date().getFullYear();
  document.getElementById('currentYear').textContent = year;
  
  const yearExp = entries.filter(e => e.type === 'expense' && e.date.startsWith(String(year)));
  const active = EXP_CATS.filter(c => yearlyBudgets[c] > 0);
  
  if (active.length === 0) {
    list.innerHTML = '<p style="color:#888;font-size:13px;margin:0">年間予算が設定されていません。「🎯 予算設定」→「🗓️ 年間予算」タブから設定してください。</p>';
    return;
  }
  
  // 全体サマリー
  const totalLimit = active.reduce((s, c) => s + yearlyBudgets[c], 0);
  const totalUsed = yearExp.filter(e => active.includes(e.category)).reduce((s, e) => s + e.amount, 0);
  const totalPct = Math.min((totalUsed / totalLimit) * 100, 100);
  const totalCls = totalUsed > totalLimit ? 'over' : totalUsed > totalLimit * 0.8 ? 'warn' : '';
  
  // 月の進捗（年のどこにいるか）
  const now = new Date();
  const yearStart = new Date(year, 0, 1);
  const yearEnd = new Date(year + 1, 0, 1);
  const yearProgress = Math.min(((now - yearStart) / (yearEnd - yearStart)) * 100, 100);
  
  list.innerHTML = '<div style="background:#fff;padding:12px;border-radius:8px;margin-bottom:15px;border:2px solid #2196F3">' +
    '<div class="budget-label"><b>📊 年間トータル</b>' +
    '<span>¥' + yen(totalUsed) + ' / ¥' + yen(totalLimit) + ' (' + Math.round(totalUsed/totalLimit*100) + '%)</span></div>' +
    '<div class="bar"><div class="fill ' + totalCls + '" style="width:' + totalPct + '%">' + Math.round(totalPct) + '%</div></div>' +
    '<div style="font-size:11px;color:#666;margin-top:6px">年の進捗: ' + Math.round(yearProgress) + '% ' +
    (totalPct < yearProgress ? '✅ 順調' : totalPct > yearProgress + 10 ? '⚠️ ペースが速い' : '👍 ほぼ予定通り') + '</div>' +
    '</div>';
  
  active.forEach(c => {
    const used = yearExp.filter(e => e.category === c).reduce((s, e) => s + e.amount, 0);
    const limit = yearlyBudgets[c];
    const pct = Math.min((used / limit) * 100, 100);
    const cls = used > limit ? 'over' : used > limit * 0.8 ? 'warn' : '';
    const div = document.createElement('div');
    div.className = 'budget-item';
    div.innerHTML = '<div class="budget-label"><span><b>' + c + '</b></span>' +
      '<span>¥' + yen(used) + ' / ¥' + yen(limit) + ' (' + Math.round(used / limit * 100) + '%)</span></div>' +
      '<div class="bar"><div class="fill ' + cls + '" style="width:' + pct + '%">' + Math.round(pct) + '%</div></div>';
    list.appendChild(div);
  });
}
function exportJSON() {
  const data = {
    entries: entries,
    budgets: budgets,
    yearlyBudgets: yearlyBudgets,
    recurring: recurring,
    exportedAt: new Date().toISOString()
  };

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);

function importJSON(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  if (!confirm('現在のデータに追加されます。続行しますか?')) {
    ev.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.entries && Array.isArray(data.entries)) {
        const existingIds = new Set(entries.map(en => en.id));
        data.entries.forEach(en => {
          if (existingIds.has(en.id)) {
            en.id = Date.now() + Math.random();
          }
          entries.push(en);
        });
      }
      if (data.budgets) {
        budgets = Object.assign({}, budgets, data.budgets);
        saveBudgetsToStorage();
      }
      if (data.yearlyBudgets) {
        yearlyBudgets = Object.assign({}, yearlyBudgets, data.yearlyBudgets);
        saveYearlyBudgets();
      }
      if (data.recurring && Array.isArray(data.recurring)) {
        recurring = recurring.concat(data.recurring);
        saveRecurring();
      }
      save();
      render();
      alert('復元しました(' + (data.entries ? data.entries.length : 0) + '件)');    } catch (err) {
      alert('復元失敗: ファイル形式が正しくありません\n' + err.message);
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

function importCSV(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let text = e.target.result;
      text = text.replace(/^\ufeff/, '');
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      
      if (lines.length < 2) {
        alert('データが見つかりません');
        return;
      }
      
      const added = [];
      const errors = [];
      
      lines.slice(1).forEach((line, idx) => {
        // ダブルクォート対応の簡易CSVパース
        const cols = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
          else if (ch === '"') inQ = !inQ;
          else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
          else cur += ch;
        }
        cols.push(cur);
        const [date, type, category, shop, memo, amount] = cols.map(c => c.trim());
        
        // 旧フォーマット（5列）にも対応
        let actualAmount = amount;
        let actualShop = shop;
        let actualMemo = memo;
        if (cols.length === 4) {
          actualAmount = cols[3].trim();
          actualShop = '';
          actualMemo = '';
        }
        
        if (!date || !type || !category || !actualAmount) {
          errors.push((idx + 2) + '行目: 項目が不足');
          return;
        }
        const amtNum = parseInt(actualAmount, 10);
        if (isNaN(amtNum) || amtNum <= 0) {
          errors.push((idx + 2) + '行目: 金額が不正');
          return;
        }
        added.push({
          id: Date.now() + Math.random(),
          date: date,
          type: (type === '収入' || type === 'income') ? 'income' : 'expense',
          category: category,
          shop: actualShop || '',
          memo: actualMemo || '',
          amount: amtNum
        });
      });      
      if (added.length === 0) {
        alert('読み込めるデータがありませんでした\n\n' + errors.join('\n'));
        return;
      }
      
      const msg = added.length + '件のデータを追加します。\nよろしいですか?' + 
                  (errors.length > 0 ? '\n\n※' + errors.length + '件のエラーがあります' : '');
      if (!confirm(msg)) {
        ev.target.value = '';
        return;
      }
      
      entries = entries.concat(added);
      save();
      render();
      alert(added.length + '件読み込みました');
    } catch (err) {
      alert('読み込み失敗: ' + err.message);
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}


const COLORS = ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF','#FF9F40','#C9CBCF','#7CB342','#EC407A'];
let catChart, monChart;

function renderCharts() {
  // カテゴリ別支出（円グラフ）
  const m = document.getElementById('fMonth').value;
  const target = m === 'all' ? entries : entries.filter(e => e.date.startsWith(m));
  const catData = {};
  target.filter(e => e.type === 'expense').forEach(e => {
    catData[e.category] = (catData[e.category] || 0) + e.amount;
  });
  const catLabels = Object.keys(catData);
  const catValues = Object.values(catData);
  
  if (catChart) catChart.destroy();
  catChart = new Chart(document.getElementById('catChart'), {
    type: 'doughnut',
    data: {
      labels: catLabels.length ? catLabels : ['データなし'],
      datasets: [{
        data: catValues.length ? catValues : [1],
        backgroundColor: catLabels.length ? COLORS : ['#ddd']
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11 } } },
        tooltip: { callbacks: { label: c => c.label + ': ¥' + yen(c.parsed) } }
      }
    }
  });
  
  // 月別推移（棒グラフ・直近6ヶ月）
  const monData = {};
  entries.forEach(e => {
    const mm = e.date.slice(0, 7);
    if (!monData[mm]) monData[mm] = { inc: 0, exp: 0 };
    if (e.type === 'income') monData[mm].inc += e.amount;
    else monData[mm].exp += e.amount;
  });
  const months = Object.keys(monData).sort().slice(-6);
  
  if (monChart) monChart.destroy();
  monChart = new Chart(document.getElementById('monChart'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label: '収入', data: months.map(mm => monData[mm].inc), backgroundColor: '#4CAF50' },
        { label: '支出', data: months.map(mm => monData[mm].exp), backgroundColor: '#f44336' }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        tooltip: { callbacks: { label: c => c.dataset.label + ': ¥' + yen(c.parsed.y) } }
      },
      scales: { y: { ticks: { callback: v => '¥' + yen(v) } } }
    }
  });
}

document.getElementById('date').valueAsDate = new Date();

function save() {
  localStorage.setItem('kakeibo', JSON.stringify(entries));
  updateMonthFilter();
}

function yen(n) {
  return Number(n).toLocaleString('ja-JP');
}

function updateMonthFilter() {
  const months = [...new Set(entries.map(e => e.date.slice(0, 7)))].sort().reverse();
  const sel = document.getElementById('fMonth');
  const cur = sel.value;
  sel.innerHTML = '<option value="all">すべての月</option>';
  months.forEach(m => {
    const o = document.createElement('option');
    o.value = m;
    o.textContent = m;
    sel.appendChild(o);
  });
  if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
}
function renderCards(list) {
  const cardList = document.getElementById('cardList');
  cardList.innerHTML = '';

  list.forEach(e => {
    const div = document.createElement('div');
    div.className = 'entry-card';

    div.innerHTML =
      '<div class="entry-card-top">' +
        '<div>' +
          '<div class="entry-card-date">' + e.date + '</div>' +
          '<div class="t-' + e.type + '">' + (e.type === 'income' ? '収入' : '支出') + ' / ' + e.category + '</div>' +
        '</div>' +
        '<div class="entry-card-amount">¥' + yen(e.amount) + '</div>' +
      '</div>' +

      '<div class="entry-card-body">' +
        '<div class="entry-card-row">' +
          '<div class="entry-card-label">店舗</div>' +
          '<div class="entry-card-value">' + (e.shop || '-') + '</div>' +
        '</div>' +
        '<div class="entry-card-row">' +
          '<div class="entry-card-label">メモ</div>' +
          '<div class="entry-card-value">' + (e.memo || '-') + '</div>' +
        '</div>' +
      '</div>' +

      '<div class="entry-card-actions">' +
        '<button class="del" onclick="deleteEntry(' + e.id + ')">削除</button>' +
      '</div>';

    cardList.appendChild(div);
  });
}
function render() {
  const m = document.getElementById('fMonth').value;
  const t = document.getElementById('fType').value;
  const q = document.getElementById('search').value.trim().toLowerCase();
  
  const filtered = entries.filter(e => {
    if (m !== 'all' && !e.date.startsWith(m)) return false;
    if (t !== 'all' && e.type !== t) return false;
    if (q && !e.category.toLowerCase().includes(q) && !String(e.amount).includes(q)
    && !(e.shop || '').toLowerCase().includes(q) && !(e.memo || '').toLowerCase().includes(q)) return false;

    return true;
  });
  
  const sorted = [...filtered].sort((a, b) => b.date.localeCompare(a.date));
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  sorted.forEach(e => {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>' + e.date + '</td>' +
      '<td class="t-' + e.type + '">' + (e.type === 'income' ? '収入' : '支出') + '</td>' +
      '<td>' + e.category + '</td>' +
      '<td>' + (e.shop || '') + '</td>' +
      '<td style="font-size:12px;color:#666">' + (e.memo || '') + '</td>' +
      '<td>¥' + yen(e.amount) + '</td>' +
      '<td><button class="del" onclick="deleteEntry(' + e.id + ')">削除</button></td>';
    tbody.appendChild(tr);
  });
  renderCards(sorted);
  document.getElementById('emptyMsg').style.display = sorted.length === 0 ? 'block' : 'none';
  
  const inc = filtered.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
  const exp = filtered.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
  document.getElementById('totalIncome').textContent = yen(inc);
  document.getElementById('totalExpense').textContent = yen(exp);
  document.getElementById('balance').textContent = yen(inc - exp);
  renderCharts();
  renderBudgets();
  renderYearlyBudgets();
}


function deleteEntry(id) {
  if (!confirm('削除しますか?')) return;
  entries = entries.filter(e => e.id !== id);
  save();
  render();
}

function exportCSV() {
  if (entries.length === 0) {
    alert('データがありません');
    return;
  }
  const header = '日付,種類,カテゴリ,店舗,メモ,金額\n';
  const rows = entries.map(e => 
    e.date + ',' + 
    (e.type === 'income' ? '収入' : '支出') + ',' + 
    e.category + ',' + 
    '"' + (e.shop || '').replace(/"/g, '""') + '","' + 
    (e.memo || '').replace(/"/g, '""') + '",' + 
    e.amount
  ).join('\n');
  const blob = new Blob(['\ufeff' + header + rows], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kakeibo_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
}

document.getElementById('entryForm').addEventListener('submit', function(e) {
  e.preventDefault();
  entries.push({
    id: Date.now(),
    date: document.getElementById('date').value,
    type: document.getElementById('type').value,
    category: document.getElementById('category').value,
    shop: document.getElementById('shop').value.trim(),
    memo: document.getElementById('memo').value.trim(),
    amount: parseInt(document.getElementById('amount').value, 10)
  });
  save();
  render();
  this.reset();

  document.getElementById('date').valueAsDate = new Date();
});
['search', 'fMonth', 'fType'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

updateMonthFilter();
render();
checkRecurring();
function scrollToEntryForm() {
  const form = document.getElementById('entryForm');
  form.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
