<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0eb;
  --card: #ffffff;
  --text: #2c2420;
  --text-sub: #7a6e64;
  --accent: #d4704e;
  --accent-light: #f0c8b4;
  --green: #5a9e6f;
  --green-light: #d4edda;
  --red: #c0504d;
  --red-light: #f8d7da;
  --blue: #4a7fb5;
  --blue-light: #cce0f5;
  --border: #e5ddd5;
  --shadow: 0 2px 12px rgba(44,36,32,0.06);
  --radius: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

h1 {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  text-align: center;
  padding: 24px 0 8px;
  color: var(--accent);
}

/* Toolbar */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin: 16px 0 24px;
}
.toolbar button {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  padding: 8px 14px;
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: 8px;
  cursor: pointer;
  color: var(--text);
  transition: all 0.2s;
}
.toolbar button:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-1px);
}

/* Summary Cards */
.summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.summary-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow);
  border-top: 3px solid var(--border);
}
.summary-card.income { border-top-color: var(--green); }
.summary-card.expense { border-top-color: var(--red); }
.summary-card.balance { border-top-color: var(--blue); }
.summary-card h3 {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-sub);
  margin-bottom: 6px;
}
.summary-card .amount {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
}
.summary-card.income .amount { color: var(--green); }
.summary-card.expense .amount { color: var(--red); }
.summary-card.balance .amount { color: var(--blue); }

/* Entry Form */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.card-title {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
}

.form-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: end;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
  min-width: 100px;
}
.form-group label {
  font-size: 0.7rem;
  color: var(--text-sub);
  font-weight: 500;
}
.form-group input,
.form-group select {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #faf8f6;
  color: var(--text);
  outline: none;
  transition: border 0.2s;
}
.form-group input:focus,
.form-group select:focus {
  border-color: var(--accent);
}

.type-toggle {
  display: flex;
  gap: 0;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.type-toggle button {
  flex: 1;
  padding: 8px 12px;
  border: none;
  background: #faf8f6;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-sub);
}
.type-toggle button.active-expense {
  background: var(--red);
  color: #fff;
}
.type-toggle button.active-income {
  background: var(--green);
  color: #fff;
}

.btn-add {
  font-family: 'Noto Sans JP', sans-serif;
  padding: 8px 24px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-add:hover {
  background: #c0613f;
  transform: translateY(-1px);
}

/* Budget Progress */
.budget-section { margin-bottom: 20px; }
.budget-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.budget-item .cat-name {
  font-size: 0.8rem;
  width: 60px;
  flex-shrink: 0;
}
.budget-bar-wrap {
  flex: 1;
  height: 20px;
  background: #f0ebe5;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
.budget-bar {
  height: 100%;
  border-radius: 10px;
  transition: width 0.5s ease;
  min-width: 2px;
}
.budget-bar.ok { background: linear-gradient(90deg, #7bc88f, #5a9e6f); }
.budget-bar.warn { background: linear-gradient(90deg, #f0c040, #e0a020); }
.budget-bar.over { background: linear-gradient(90deg, #e07070, #c0504d); }
.budget-text {
  font-size: 0.7rem;
  color: var(--text-sub);
  width: 120px;
  text-align: right;
  flex-shrink: 0;
}

/* Charts */
.chart-container {
  position: relative;
  width: 100%;
  max-width: 300px;
  margin: 0 auto;
}
.chart-container canvas {
  width: 100% !important;
  height: auto !important;
}
.chart-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  justify-content: center;
  margin-top: 12px;
  font-size: 0.75rem;
}
.chart-legend span {
  display: flex;
  align-items: center;
  gap: 4px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  height: 180px;
  padding: 0 4px;
  margin-top: 12px;
}
.bar-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
  justify-content: flex-end;
}
.bar-val {
  font-size: 0.6rem;
  color: var(--text-sub);
  margin-bottom: 2px;
  white-space: nowrap;
}
.bar {
  width: 100%;
  max-width: 40px;
  border-radius: 4px 4px 0 0;
  transition: height 0.5s ease;
}
.bar.income-bar { background: var(--green); }
.bar.expense-bar { background: var(--red); }
.bar-label {
  font-size: 0.6rem;
  color: var(--text-sub);
  margin-top: 4px;
}

/* Filters */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}
.filters select, .filters input {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #faf8f6;
  color: var(--text);
  outline: none;
}

/* Table */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}
thead th {
  background: #f0ebe5;
  padding: 10px 8px;
  text-align: left;
  font-weight: 600;
  font-size: 0.75rem;
  color: var(--text-sub);
  white-space: nowrap;
  border-bottom: 2px solid var(--border);
}
tbody td {
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr:hover { background: #faf8f6; }
.amount-cell.income-text { color: var(--green); font-weight: 600; }
.amount-cell.expense-text { color: var(--red); font-weight: 600; }

.btn-edit {
  background: none;
  border: 1px solid var(--blue-light);
  color: var(--blue);
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.7rem;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.2s;
  margin-right: 4px;
}
.btn-edit:hover { background: var(--blue-light); }

.btn-del {
  background: none;
  border: 1px solid var(--red-light);
  color: var(--red);
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.7rem;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.2s;
}
.btn-del:hover { background: var(--red-light); }

.action-btns { display: flex; gap: 4px; }

.empty-msg {
  text-align: center;
  padding: 30px;
  color: var(--text-sub);
  font-size: 0.85rem;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44,36,32,0.4);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 520px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 8px 40px rgba(44,36,32,0.15);
  animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal h2 {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 1.1rem;
  margin-bottom: 16px;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}
.btn-cancel, .btn-save {
  font-family: 'Noto Sans JP', sans-serif;
  padding: 8px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  border: none;
  transition: all 0.2s;
}
.btn-cancel {
  background: #f0ebe5;
  color: var(--text-sub);
}
.btn-save {
  background: var(--accent);
  color: #fff;
}
.btn-save:hover { background: #c0613f; }

.budget-input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.budget-input-row label {
  font-size: 0.8rem;
  width: 70px;
}
.budget-input-row input {
  flex: 1;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #faf8f6;
  outline: none;
}

/* Confirm dialog */
.confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44,36,32,0.4);
  z-index: 150;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 340px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 40px rgba(44,36,32,0.15);
  animation: modalIn 0.25s ease;
}
.confirm-box p {
  font-size: 0.9rem;
  margin-bottom: 20px;
}
.confirm-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
}
.confirm-btns button {
  font-family: 'Noto Sans JP', sans-serif;
  padding: 8px 24px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}
.confirm-btns .btn-confirm-cancel { background: #f0ebe5; color: var(--text-sub); }
.confirm-btns .btn-confirm-ok { background: var(--red); color: #fff; }
.confirm-btns .btn-confirm-ok:hover { background: #a04040; }

/* Recurring list */
.recurring-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
}

.tab-bar {
  display: flex;
  gap: 0;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}
.tab-bar button {
  flex: 1;
  padding: 8px;
  border: none;
  background: #faf8f6;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  color: var(--text-sub);
  transition: all 0.2s;
}
.tab-bar button.active {
  background: var(--accent);
  color: #fff;
}

/* Month navigation */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.month-nav button {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s;
  color: var(--text);
}
.month-nav button:hover { border-color: var(--accent); }
.month-nav .current-month {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  min-width: 140px;
  text-align: center;
}

/* Pie chart with CSS */
.pie-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.pie-svg { width: 200px; height: 200px; }

/* responsive */
@media (max-width: 600px) {
  .summary { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .summary-card { padding: 12px 8px; }
  .summary-card .amount { font-size: 1rem; }
  .form-row { flex-direction: column; }
  .form-group { min-width: 100%; }
  .budget-text { width: 90px; font-size: 0.65rem; }
}

/* File input hidden */
.file-input { display: none; }

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: #fff;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 0.85rem;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="container">
  <h1>💰 家計簿ツール</h1>

  <!-- Toolbar -->
  <div class="toolbar">
    <button onclick="openBudgetModal()">🎯 予算設定</button>
    <button onclick="openRecurringModal()">🔁 定期収支</button>
    <button onclick="exportCSV()">📤 CSV出力</button>
    <button onclick="document.getElementById('csvInput').click()">📥 CSV読込</button>
    <button onclick="backupData()">💾 バックアップ</button>
    <button onclick="document.getElementById('restoreInput').click()">📂 復元</button>
    <input type="file" id="csvInput" class="file-input" accept=".csv" onchange="importCSV(event)">
    <input type="file" id="restoreInput" class="file-input" accept=".json" onchange="restoreData(event)">
  </div>

  <!-- Month Navigation -->
  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <div class="current-month" id="currentMonth"></div>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="summary-card income">
      <h3>収入</h3>
      <div class="amount" id="totalIncome">¥0</div>
    </div>
    <div class="summary-card expense">
      <h3>支出</h3>
      <div class="amount" id="totalExpense">¥0</div>
    </div>
    <div class="summary-card balance">
      <h3>残高</h3>
      <div class="amount" id="totalBalance">¥0</div>
    </div>
  </div>

  <!-- Entry Form -->
  <div class="card">
    <div class="card-title">📝 記録を追加</div>
    <div class="form-row">
      <div class="form-group" style="min-width:130px;flex:0 0 auto;">
        <label>種類</label>
        <div class="type-toggle" id="typeToggle">
          <button class="active-expense" onclick="setType('expense')">支出</button>
          <button onclick="setType('income')">収入</button>
        </div>
      </div>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="entryDate">
      </div>
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="entryCategory"></select>
      </div>
      <div class="form-group">
        <label>金額</label>
        <input type="number" id="entryAmount" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>店舗</label>
        <input type="text" id="entryShop" placeholder="任意">
      </div>
      <div class="form-group">
        <label>メモ</label>
        <input type="text" id="entryMemo" placeholder="任意">
      </div>
      <div class="form-group" style="flex:0 0 auto;">
        <label>&nbsp;</label>
        <button class="btn-add" onclick="addEntry()">追加</button>
      </div>
    </div>
  </div>

  <!-- Budget Achievement (Monthly) -->
  <div class="card">
    <div class="card-title">🎯 予算達成状況（今月）</div>
    <div id="budgetProgress"></div>
  </div>

  <!-- Yearly Budget -->
  <div class="card">
    <div class="card-title">🗓️ 年間予算達成状況</div>
    <div id="yearlyBudgetProgress"></div>
  </div>

  <!-- Category Pie -->
  <div class="card">
    <div class="card-title">📊 カテゴリ別支出</div>
    <div class="pie-wrap" id="pieChart"></div>
  </div>

  <!-- Monthly Trend -->
  <div class="card">
    <div class="card-title">📈 月別推移</div>
    <div id="trendChart"></div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="card-title">📋 履歴</div>
    <div class="filters">
      <select id="filterMonth" onchange="render()"></select>
      <select id="filterType" onchange="render()">
        <option value="all">すべての種類</option>
        <option value="income">収入のみ</option>
        <option value="expense">支出のみ</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日付</th><th>種類</th><th>カテゴリ</th><th>店舗</th><th>メモ</th><th>金額</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Budget Modal -->
<div class="modal-overlay" id="budgetModal">
  <div class="modal">
    <h2>🎯 予算設定</h2>
    <div class="tab-bar" id="budgetTabs">
      <button class="active" onclick="switchBudgetTab('monthly')">📅 月次予算</button>
      <button onclick="switchBudgetTab('yearly')">🗓️ 年間予算</button>
    </div>
    <div id="budgetMonthlyInputs"></div>
    <div id="budgetYearlyInputs" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeBudgetModal()">キャンセル</button>
      <button class="btn-save" onclick="saveBudget()">保存</button>
    </div>
  </div>
</div>

<!-- Recurring Modal -->
<div class="modal-overlay" id="recurringModal">
  <div class="modal">
    <h2>🔁 定期収支の管理</h2>
    <p style="font-size:0.8rem;color:var(--text-sub);margin-bottom:16px;">毎月決まった日に自動で記録される項目を設定します</p>

    <div style="font-weight:600;font-size:0.85rem;margin-bottom:8px;">新規追加</div>
    <div class="form-row" style="margin-bottom:16px;">
      <div class="form-group">
        <label>種類</label>
        <select id="recType">
          <option value="expense">支出</option>
          <option value="income">収入</option>
        </select>
      </div>
      <div class="form-group">
        <label>日</label>
        <input type="number" id="recDay" min="1" max="28" value="1" style="width:60px">
      </div>
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="recCategory"></select>
      </div>
      <div class="form-group">
        <label>金額</label>
        <input type="number" id="recAmount" placeholder="0">
      </div>
      <div class="form-group">
        <label>メモ</label>
        <input type="text" id="recMemo" placeholder="任意">
      </div>
      <div class="form-group" style="flex:0 0 auto;">
        <label>&nbsp;</label>
        <button class="btn-add" onclick="addRecurring()">追加</button>
      </div>
    </div>

    <div style="font-weight:600;font-size:0.85rem;margin-bottom:8px;">登録済み</div>
    <div id="recurringList"></div>

    <div class="modal-actions">
      <button class="btn-save" onclick="applyRecurring()">📥 今月分を反映</button>
      <button class="btn-cancel" onclick="closeRecurringModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p>この記録を削除しますか？</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="cancelDelete()">キャンセル</button>
      <button class="btn-confirm-ok" onclick="executeDelete()">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>✏️ 記録を編集</h2>
    <input type="hidden" id="editId">
    <div class="form-row" style="flex-direction:column;gap:12px;">
      <div class="form-group">
        <label>種類</label>
        <select id="editType" onchange="updateEditCategories()">
          <option value="expense">支出</option>
          <option value="income">収入</option>
        </select>
      </div>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="editDate">
      </div>
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="editCategory"></select>
      </div>
      <div class="form-group">
        <label>金額</label>
        <input type="number" id="editAmount" min="0">
      </div>
      <div class="form-group">
        <label>店舗</label>
        <input type="text" id="editShop">
      </div>
      <div class="form-group">
        <label>メモ</label>
        <input type="text" id="editMemo">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<script>
// ─── Data ──────────────────────────────
const EXPENSE_CATS = ['食費','交通費','日用品','娯楽','光熱費','家賃','医療','その他'];
const INCOME_CATS = ['給料','副業','その他'];
const ALL_CATS = [...EXPENSE_CATS, ...INCOME_CATS];
const CAT_COLORS = {
  '食費':'#e07050','交通費':'#4a9ec2','日用品':'#8ebe50','娯楽':'#c070c0',
  '光熱費':'#e0a030','家賃':'#607090','医療':'#50beb0','給料':'#5a9e6f',
  '副業':'#7abf7a','その他':'#a0a0a0'
};

let entries = JSON.parse(localStorage.getItem('kb_entries') || '[]');
let budgets = JSON.parse(localStorage.getItem('kb_budgets') || '{}');
let yearlyBudgets = JSON.parse(localStorage.getItem('kb_yearly_budgets') || '{}');
let recurring = JSON.parse(localStorage.getItem('kb_recurring') || '[]');

let currentType = 'expense';
let viewYear, viewMonth;

function init() {
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  document.getElementById('entryDate').value = formatDate(now);
  populateCategories();
  populateFilterMonths();
  render();
}

function save() {
  localStorage.setItem('kb_entries', JSON.stringify(entries));
  localStorage.setItem('kb_budgets', JSON.stringify(budgets));
  localStorage.setItem('kb_yearly_budgets', JSON.stringify(yearlyBudgets));
  localStorage.setItem('kb_recurring', JSON.stringify(recurring));
}

function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatYen(n) {
  return '¥' + Number(n).toLocaleString();
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Type toggle ─────────────────────
function setType(type) {
  currentType = type;
  const btns = document.querySelectorAll('#typeToggle button');
  btns[0].className = type === 'expense' ? 'active-expense' : '';
  btns[1].className = type === 'income' ? 'active-income' : '';
  populateCategories();
}

function populateCategories() {
  const sel = document.getElementById('entryCategory');
  const cats = currentType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

// ─── Month nav ───────────────────────
function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
}

// ─── Add Entry ───────────────────────
function addEntry() {
  const date = document.getElementById('entryDate').value;
  const category = document.getElementById('entryCategory').value;
  const amount = parseInt(document.getElementById('entryAmount').value);
  const shop = document.getElementById('entryShop').value.trim();
  const memo = document.getElementById('entryMemo').value.trim();

  if (!date || !amount || amount <= 0) { toast('日付と金額を入力してください'); return; }

  entries.push({ id: Date.now(), date, type: currentType, category, amount, shop, memo });
  entries.sort((a,b) => b.date.localeCompare(a.date));
  save();
  document.getElementById('entryAmount').value = '';
  document.getElementById('entryShop').value = '';
  document.getElementById('entryMemo').value = '';
  toast('追加しました');
  render();
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  toast('削除しました');
  render();
}

// ─── Render ──────────────────────────
function render() {
  const ym = viewYear + '-' + String(viewMonth+1).padStart(2,'0');
  document.getElementById('currentMonth').textContent = `${viewYear}年${viewMonth+1}月`;

  const monthEntries = entries.filter(e => e.date.startsWith(ym));
  const inc = monthEntries.filter(e => e.type === 'income').reduce((s,e) => s + e.amount, 0);
  const exp = monthEntries.filter(e => e.type === 'expense').reduce((s,e) => s + e.amount, 0);

  document.getElementById('totalIncome').textContent = formatYen(inc);
  document.getElementById('totalExpense').textContent = formatYen(exp);
  document.getElementById('totalBalance').textContent = formatYen(inc - exp);

  renderBudgetProgress(monthEntries);
  renderYearlyBudget();
  renderPie(monthEntries);
  renderTrend();
  renderHistory();
  populateFilterMonths();
}

// ─── Budget Progress ─────────────────
function renderBudgetProgress(monthEntries) {
  const wrap = document.getElementById('budgetProgress');
  const cats = EXPENSE_CATS;
  let html = '';
  let hasBudget = false;
  cats.forEach(cat => {
    const b = budgets[cat] || 0;
    if (b <= 0) return;
    hasBudget = true;
    const spent = monthEntries.filter(e => e.type === 'expense' && e.category === cat).reduce((s,e) => s + e.amount, 0);
    const pct = Math.min((spent / b) * 100, 100);
    const cls = pct >= 100 ? 'over' : pct >= 80 ? 'warn' : 'ok';
    html += `<div class="budget-item">
      <span class="cat-name">${cat}</span>
      <div class="budget-bar-wrap"><div class="budget-bar ${cls}" style="width:${pct}%"></div></div>
      <span class="budget-text">${formatYen(spent)} / ${formatYen(b)}</span>
    </div>`;
  });
  wrap.innerHTML = hasBudget ? html : '<div class="empty-msg">予算が設定されていません</div>';
}

function renderYearlyBudget() {
  const wrap = document.getElementById('yearlyBudgetProgress');
  const yearEntries = entries.filter(e => e.date.startsWith(String(viewYear)));
  let html = '';
  let has = false;
  EXPENSE_CATS.forEach(cat => {
    const b = yearlyBudgets[cat] || 0;
    if (b <= 0) return;
    has = true;
    const spent = yearEntries.filter(e => e.type === 'expense' && e.category === cat).reduce((s,e) => s + e.amount, 0);
    const pct = Math.min((spent / b) * 100, 100);
    const cls = pct >= 100 ? 'over' : pct >= 80 ? 'warn' : 'ok';
    html += `<div class="budget-item">
      <span class="cat-name">${cat}</span>
      <div class="budget-bar-wrap"><div class="budget-bar ${cls}" style="width:${pct}%"></div></div>
      <span class="budget-text">${formatYen(spent)} / ${formatYen(b)}</span>
    </div>`;
  });
  wrap.innerHTML = has ? html : '<div class="empty-msg">年間予算が設定されていません</div>';
}

// ─── Pie Chart (SVG) ─────────────────
function renderPie(monthEntries) {
  const wrap = document.getElementById('pieChart');
  const data = {};
  monthEntries.filter(e => e.type === 'expense').forEach(e => {
    data[e.category] = (data[e.category] || 0) + e.amount;
  });
  const items = Object.entries(data).sort((a,b) => b[1] - a[1]);
  const total = items.reduce((s,i) => s + i[1], 0);
  if (total === 0) { wrap.innerHTML = '<div class="empty-msg">支出データがありません</div>'; return; }

  let angle = 0;
  let paths = '';
  items.forEach(([cat, val]) => {
    const pct = val / total;
    const a1 = angle;
    const a2 = angle + pct * 360;
    const large = pct > 0.5 ? 1 : 0;
    const r = 90;
    const cx = 100, cy = 100;
    const x1 = cx + r * Math.cos((a1-90)*Math.PI/180);
    const y1 = cy + r * Math.sin((a1-90)*Math.PI/180);
    const x2 = cx + r * Math.cos((a2-90)*Math.PI/180);
    const y2 = cy + r * Math.sin((a2-90)*Math.PI/180);
    paths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${CAT_COLORS[cat]||'#aaa'}" stroke="#fff" stroke-width="1.5"/>`;
    angle = a2;
  });

  let legendHtml = items.map(([cat, val]) =>
    `<span><span class="legend-dot" style="background:${CAT_COLORS[cat]||'#aaa'}"></span>${cat} ${formatYen(val)} (${Math.round(val/total*100)}%)</span>`
  ).join('');

  wrap.innerHTML = `<svg class="pie-svg" viewBox="0 0 200 200">${paths}</svg><div class="chart-legend">${legendHtml}</div>`;
}

// ─── Trend Chart ─────────────────────
function renderTrend() {
  const wrap = document.getElementById('trendChart');
  const months = [];
  for (let i = 5; i >= 0; i--) {
    let m = viewMonth - i;
    let y = viewYear;
    while (m < 0) { m += 12; y--; }
    months.push({ y, m, label: `${m+1}月` });
  }
  let maxVal = 1;
  const data = months.map(({ y, m, label }) => {
    const ym = y + '-' + String(m+1).padStart(2,'0');
    const me = entries.filter(e => e.date.startsWith(ym));
    const inc = me.filter(e => e.type === 'income').reduce((s,e) => s + e.amount, 0);
    const exp = me.filter(e => e.type === 'expense').reduce((s,e) => s + e.amount, 0);
    maxVal = Math.max(maxVal, inc, exp);
    return { label, inc, exp };
  });

  let html = '<div class="bar-chart">';
  data.forEach(d => {
    const ih = Math.max((d.inc / maxVal) * 150, d.inc > 0 ? 4 : 0);
    const eh = Math.max((d.exp / maxVal) * 150, d.exp > 0 ? 4 : 0);
    html += `<div class="bar-group">
      <div style="display:flex;gap:3px;align-items:flex-end;height:160px;">
        <div>
          <div class="bar-val">${d.inc > 0 ? (d.inc >= 10000 ? Math.round(d.inc/10000)+'万' : formatYen(d.inc)) : ''}</div>
          <div class="bar income-bar" style="height:${ih}px;width:16px;"></div>
        </div>
        <div>
          <div class="bar-val">${d.exp > 0 ? (d.exp >= 10000 ? Math.round(d.exp/10000)+'万' : formatYen(d.exp)) : ''}</div>
          <div class="bar expense-bar" style="height:${eh}px;width:16px;"></div>
        </div>
      </div>
      <div class="bar-label">${d.label}</div>
    </div>`;
  });
  html += '</div>';
  html += '<div class="chart-legend" style="margin-top:8px;"><span><span class="legend-dot" style="background:var(--green)"></span>収入</span><span><span class="legend-dot" style="background:var(--red)"></span>支出</span></div>';
  wrap.innerHTML = html;
}

// ─── History Table ───────────────────
function populateFilterMonths() {
  const sel = document.getElementById('filterMonth');
  const prev = sel.value;
  const monthSet = new Set();
  entries.forEach(e => monthSet.add(e.date.substring(0,7)));
  const current = viewYear + '-' + String(viewMonth+1).padStart(2,'0');
  monthSet.add(current);
  const sorted = [...monthSet].sort().reverse();
  sel.innerHTML = '<option value="all">すべての月</option>' + sorted.map(m => `<option value="${m}">${m.replace('-','年')}月</option>`).join('');
  if (prev && [...sel.options].some(o => o.value === prev)) sel.value = prev;
  else sel.value = current;
}

function renderHistory() {
  const tbody = document.getElementById('historyBody');
  const fm = document.getElementById('filterMonth').value;
  const ft = document.getElementById('filterType').value;

  let filtered = entries;
  if (fm !== 'all') filtered = filtered.filter(e => e.date.startsWith(fm));
  if (ft !== 'all') filtered = filtered.filter(e => e.type === ft);

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">記録がありません。</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(e => `<tr>
    <td>${e.date}</td>
    <td>${e.type === 'income' ? '収入' : '支出'}</td>
    <td>${e.category}</td>
    <td>${e.shop || '-'}</td>
    <td>${e.memo || '-'}</td>
    <td class="amount-cell ${e.type === 'income' ? 'income-text' : 'expense-text'}">${e.type === 'income' ? '+' : '-'}${formatYen(e.amount)}</td>
    <td><div class="action-btns"><button class="btn-edit" onclick="openEditModal(${e.id})">編集</button><button class="btn-del" onclick="confirmDelete(${e.id})">削除</button></div></td>
  </tr>`).join('');
}

// ─── Edit Modal ──────────────────────
function openEditModal(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('editId').value = id;
  document.getElementById('editType').value = e.type;
  document.getElementById('editDate').value = e.date;
  updateEditCategories(e.category);
  document.getElementById('editAmount').value = e.amount;
  document.getElementById('editShop').value = e.shop || '';
  document.getElementById('editMemo').value = e.memo || '';
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }

function updateEditCategories(selected) {
  const type = document.getElementById('editType').value;
  const cats = type === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  const sel = document.getElementById('editCategory');
  sel.innerHTML = cats.map(c => `<option value="${c}"${c === selected ? ' selected' : ''}>${c}</option>`).join('');
}

function saveEdit() {
  const id = parseInt(document.getElementById('editId').value);
  const e = entries.find(x => x.id === id);
  if (!e) return;
  const amount = parseInt(document.getElementById('editAmount').value);
  if (!amount || amount <= 0) { toast('金額を正しく入力してください'); return; }
  e.type = document.getElementById('editType').value;
  e.date = document.getElementById('editDate').value;
  e.category = document.getElementById('editCategory').value;
  e.amount = amount;
  e.shop = document.getElementById('editShop').value.trim();
  e.memo = document.getElementById('editMemo').value.trim();
  entries.sort((a,b) => b.date.localeCompare(a.date));
  save();
  closeEditModal();
  toast('更新しました');
  render();
}

let pendingDeleteId = null;

function confirmDelete(id) {
  pendingDeleteId = id;
  document.getElementById('confirmOverlay').classList.add('open');
}
function cancelDelete() {
  pendingDeleteId = null;
  document.getElementById('confirmOverlay').classList.remove('open');
}
function executeDelete() {
  if (pendingDeleteId !== null) {
    deleteEntry(pendingDeleteId);
    pendingDeleteId = null;
  }
  document.getElementById('confirmOverlay').classList.remove('open');
}

// ─── Budget Modal ────────────────────
function openBudgetModal() {
  const wrap1 = document.getElementById('budgetMonthlyInputs');
  const wrap2 = document.getElementById('budgetYearlyInputs');
  wrap1.innerHTML = EXPENSE_CATS.map(c => `<div class="budget-input-row"><label>${c}</label><input type="number" data-cat="${c}" data-scope="monthly" value="${budgets[c]||0}" min="0"></div>`).join('');
  wrap2.innerHTML = EXPENSE_CATS.map(c => `<div class="budget-input-row"><label>${c}</label><input type="number" data-cat="${c}" data-scope="yearly" value="${yearlyBudgets[c]||0}" min="0"></div>`).join('');
  document.getElementById('budgetModal').classList.add('open');
}
function closeBudgetModal() { document.getElementById('budgetModal').classList.remove('open'); }
function switchBudgetTab(tab) {
  const btns = document.querySelectorAll('#budgetTabs button');
  btns[0].className = tab === 'monthly' ? 'active' : '';
  btns[1].className = tab === 'yearly' ? 'active' : '';
  document.getElementById('budgetMonthlyInputs').style.display = tab === 'monthly' ? '' : 'none';
  document.getElementById('budgetYearlyInputs').style.display = tab === 'yearly' ? '' : 'none';
}
function saveBudget() {
  document.querySelectorAll('#budgetMonthlyInputs input').forEach(inp => {
    budgets[inp.dataset.cat] = parseInt(inp.value) || 0;
  });
  document.querySelectorAll('#budgetYearlyInputs input').forEach(inp => {
    yearlyBudgets[inp.dataset.cat] = parseInt(inp.value) || 0;
  });
  save(); closeBudgetModal(); toast('予算を保存しました'); render();
}

// ─── Recurring Modal ─────────────────
function openRecurringModal() {
  const sel = document.getElementById('recCategory');
  sel.innerHTML = [...EXPENSE_CATS, ...INCOME_CATS].map(c => `<option value="${c}">${c}</option>`).join('');
  renderRecurringList();
  document.getElementById('recurringModal').classList.add('open');
}
function closeRecurringModal() { document.getElementById('recurringModal').classList.remove('open'); }

function addRecurring() {
  const type = document.getElementById('recType').value;
  const day = parseInt(document.getElementById('recDay').value) || 1;
  const category = document.getElementById('recCategory').value;
  const amount = parseInt(document.getElementById('recAmount').value);
  const memo = document.getElementById('recMemo').value.trim();
  if (!amount || amount <= 0) { toast('金額を入力してください'); return; }
  recurring.push({ id: Date.now(), type, day, category, amount, memo });
  save(); renderRecurringList(); toast('追加しました');
  document.getElementById('recAmount').value = '';
  document.getElementById('recMemo').value = '';
}
function deleteRecurring(id) {
  recurring = recurring.filter(r => r.id !== id);
  save(); renderRecurringList(); toast('削除しました');
}
function renderRecurringList() {
  const wrap = document.getElementById('recurringList');
  if (recurring.length === 0) { wrap.innerHTML = '<div class="empty-msg">登録なし</div>'; return; }
  wrap.innerHTML = recurring.map(r => `<div class="recurring-item">
    <span>毎月${r.day}日 / ${r.type === 'income' ? '収入' : '支出'} / ${r.category} / ${formatYen(r.amount)}${r.memo ? ' / '+r.memo : ''}</span>
    <button class="btn-del" onclick="deleteRecurring(${r.id})">削除</button>
  </div>`).join('');
}
function applyRecurring() {
  const ym = viewYear + '-' + String(viewMonth+1).padStart(2,'0');
  let added = 0;
  recurring.forEach(r => {
    const date = ym + '-' + String(r.day).padStart(2,'0');
    const exists = entries.some(e => e.date === date && e.category === r.category && e.amount === r.amount && e.memo === (r.memo || '') && e.type === r.type);
    if (!exists) {
      entries.push({ id: Date.now() + added, date, type: r.type, category: r.category, amount: r.amount, shop: '', memo: r.memo || '' });
      added++;
    }
  });
  entries.sort((a,b) => b.date.localeCompare(a.date));
  save(); toast(`${added}件反映しました`); render();
}

// ─── CSV Export / Import ─────────────
function exportCSV() {
  let csv = '\uFEFF日付,種類,カテゴリ,店舗,メモ,金額\n';
  entries.forEach(e => {
    csv += `${e.date},${e.type === 'income' ? '収入' : '支出'},${e.category},${e.shop||''},${e.memo||''},${e.amount}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `kakeibo_${formatDate(new Date())}.csv`;
  a.click();
  toast('CSVを出力しました');
}

function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const lines = e.target.result.split('\n').filter(l => l.trim());
    let added = 0;
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length < 6) continue;
      const type = cols[1].trim() === '収入' ? 'income' : 'expense';
      entries.push({
        id: Date.now() + i,
        date: cols[0].trim(),
        type,
        category: cols[2].trim(),
        shop: cols[3].trim(),
        memo: cols[4].trim(),
        amount: parseInt(cols[5]) || 0
      });
      added++;
    }
    entries.sort((a,b) => b.date.localeCompare(a.date));
    save(); toast(`${added}件読み込みました`); render();
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── Backup / Restore ────────────────
function backupData() {
  const data = { entries, budgets, yearlyBudgets, recurring, version: 1 };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `kakeibo_backup_${formatDate(new Date())}.json`;
  a.click();
  toast('バックアップしました');
}

function restoreData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.entries) entries = data.entries;
      if (data.budgets) budgets = data.budgets;
      if (data.yearlyBudgets) yearlyBudgets = data.yearlyBudgets;
      if (data.recurring) recurring = data.recurring;
      save(); toast('復元しました'); render();
    } catch { toast('ファイルの読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
document.getElementById('confirmOverlay').addEventListener('click', e => {
  if (e.target.id === 'confirmOverlay') cancelDelete();
});

init();
</script>
</body>
</html>
